  # ==========================================
  # QUIZ SERVICE
  # ==========================================
  /quizzes:
    post:
      tags: [Quiz Service]
      summary: Request a quiz for a specific topic
      operationId: requestQuiz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                topicId:
                  type: string
                  example: "cse_326_3_1"
      responses:
        '200':
          description: Returns a Quiz object
          content:
            application/json:
              schema:
                type: object
                properties:
                  quizId:
                    type: string
                    example: "quiz_101"
                  topicId:
                    type: string
                    example: "cse_326_3_1"
                  title:
                    type: string
                    example: "Relational Database Design Quiz"
                  durationMinutes:
                    type: integer
                    example: 30
                  passingScorePercentage:
                    type: integer
                    example: 80
                  questions:
                    type: array
                    items:
                      type: object
                      properties:
                        quesId:
                          type: string
                          example: "qid01"
                        questionType:
                          type: string
                          enum: [MULTIPLE_CHOICE, TRUE_FALSE, SHORT_ANSWER]
                          example: "MULTIPLE_CHOICE"
                        questionText:
                          type: string
                          example: "What is the primary key used for?"
                        points:
                          type: integer
                          example: 5
                        options:
                          type: array
                          items:
                            type: string
                          example: ["Unique identification", "Foreign mapping", "Data indexing", "Sorting"]
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /quizzes/{quizId}/evaluate:
    post:
      tags: [Quiz Service]
      summary: Evaluate submitted quiz answers
      operationId: evaluateQuiz
      parameters:
        - name: quizId
          in: path
          required: true
          schema: 
            type: string
            example: "quiz_326"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quizId: 
                  type: string
                  example: "quiz_326"
                answers:
                  type: array
                  items:
                    type: object
                    properties:
                      quesId: 
                        type: string
                        example: "qid01"
                      answer:
                        type: string
                        example: "A"
                  example:
                    - quesId: "qid01"
                      answer: "Unique identification"
                    - quesId: "qid02"
                      answer: "Foreign mapping"
      responses:
        '200':
          description: Returns the result of the quiz
          content:
            application/json:
              schema:
                type: object
                properties:
                  evaluationId:
                    type: string
                    example: "eval_9982"
                  scorePercentage:
                    type: number
                    format: double
                    example: 85.0
                  passed:
                    type: boolean
                    example: true
                  correctAnswers:
                    type: integer
                    example: 17
                  totalQuestions:
                    type: integer
                    example: 20
                  submittedAt:
                    type: string
                    format: date-time
                    example: "2026-03-12T23:45:00Z"
                  detailedFeedback:
                    type: array
                    description: Breakdown of each submitted answer
                    items:
                      type: object
                      properties:
                        quesId:
                          type: string
                          example: "qid01"
                        isCorrect:
                          type: boolean
                          example: true
                        providedAnswer:
                          type: string
                          example: "Unique identification"
                        correctAnswer:
                          type: string
                          example: "Unique identification"
                        pointsAwarded:
                          type: integer
                          example: 5
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /quizzes/{quizId}/results:
    get:
      tags: [Quiz Service]
      summary: Request the results of an evaluated quiz
      operationId: getQuizResult
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: string
            example: "quiz_326"
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Returns a paginated list of historical evaluation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: The list of evaluation results
                    items:
                      type: object
                      properties:
                        evaluationId:
                          type: string
                          example: "eval_9982"
                        quizId:
                          type: string
                          example: "quiz_326"
                        scorePercentage: 
                          type: number
                          format: double
                          example: 85.0
                        passed: 
                          type: boolean
                          example: true
                        correctAnswers:
                          type: integer
                          example: 17
                        totalQuestions:
                          type: integer
                          example: 20
                        submittedAt:
                          type: string
                          format: date-time
                          example: "2026-03-12T23:45:00Z"
                  meta:
                    $ref: '#/components/schemas/Meta'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  

  # ==========================================
  # LEARNING PROGRESS SERVICE
  # ==========================================
  /progress:
    post:
      tags: [Learning Progress Service]
      summary: Initialize progress tracking for a client
      operationId: initializeCourseProgress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [courseId]
              properties:
                courseId:
                  type: string
                  example: "cse_326"
      responses:
        '201':
          description: Progress tracking initialized successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  progressId:
                    type: string
                    example: "prog_881"
                  clientId:
                    type: string
                    example: "2105116"
                  courseId:
                    type: string
                    example: "cse_326"
                  overallStatus:
                    type: string
                    enum: [NOT_STARTED, IN_PROGRESS, COMPLETED]
                    example: "NOT_STARTED"
                  completionPercentage:
                    type: number
                    format: double
                    example: 0.0
                  startedAt:
                    type: string
                    format: date-time
                    example: "2026-03-12T23:50:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /progress/courses/{courseId}:
    get:
      tags: [Learning Progress Service]
      summary: Get specific course progress data
      operationId: getCourseProgressData
      parameters:
        - name: courseId
          in: path
          required: true
          schema: 
            type: string
            example: "cse_326"
      responses:
        '200':
          description: Returns a progress object along with topic-level details
          content:
            application/json:
              schema:
                type: object
                properties:
                  courseId:
                    type: string
                    example: "cse_326"
                  overallStatus:
                    type: string
                    enum: [NOT_STARTED, IN_PROGRESS, COMPLETED]
                    example: "IN_PROGRESS"
                  overallCompletionPercentage:
                    type: number
                    format: double
                    example: 45.5
                  timeSpentSeconds:
                    type: integer
                    example: 14400
                  topicsProgress:
                    type: array
                    items:
                      type: object
                      properties:
                        topicId:
                          type: string
                          example: "cse_326_3"
                        videos:
                          type: array
                          description: A list of videos and their current progress status
                          items:
                            type: object
                            required: [videoId, status]
                            properties:
                              videoId:
                                type: string
                                example: "vid_9x8y7z"
                              status:
                                type: string
                                enum: [NOT_STARTED, IN_PROGRESS, COMPLETED]
                                example: "COMPLETED"
                          # This provides the multiple entries in the Swagger UI
                          example:
                            - videoId: "vdo_001_intro"
                              status: "COMPLETED"
                            - videoId: "vdo_002_setup"
                              status: "IN_PROGRESS"
                            - videoId: "vdo_003_advanced"
                              status: "NOT_STARTED"
                        quiz:
                          type: string
                          enum: [NOT_STARTED, IN_PROGRESS, COMPLETED]
                          example: "NOT_STARTED"
                        status:
                          type: string
                          enum: [NOT_STARTED, IN_PROGRESS, COMPLETED]
                          example: "IN_PROGRESS"
                        startedAt:
                          type: string
                          format: date-time
                          example: "2026-03-10T10:00:00Z"
                        lastAccessed:
                          type: string
                          format: date-time
                          example: "2026-03-12T10:00:00Z"
                        completedAt:
                          type: string
                          format: date-time
                          example: "2026-03-12T11:00:00Z"
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags: [Learning Progress Service]
      summary: Update course progress data
      operationId: updateCourseProgressData
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
            example: "cse_326"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topicId
                - videoId
                - status
              properties:
                topicId:
                  type: string
                  description: The ID of the specific module or topic being updated
                  example: "cse_326_3"
                videoId:
                  type: string
                  example: "vid_9x8y7z"
                status:
                  type: string
                  enum: [NOT_STARTED, IN_PROGRESS, COMPLETED]
                  description: Current learning status of the module
                  example: "COMPLETED"
      responses:
        '200':
          description: Progress updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  topicId:
                    type: string
                    example: "cse_326_3"
                  updatedTopicStatus:
                    type: string
                    enum: [NOT_STARTED, IN_PROGRESS, COMPLETED]
                    example: "COMPLETED"
                  lastAccessed:
                    type: string
                    format: date-time
                    example: "2026-03-12T23:55:00Z"
                  newOverallCompletionPercentage:
                    type: number
                    format: double
                    description: The new total completion percentage for the course after this update
                    example: 48.0
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  schemas:
    Course:
      type: object
      properties:
        title:
          type: string
          example: "Information System Design Sessional"
        courseId:
          type: string
          example: "cse_326"
        partnerId:
          type: string
          example: "ZIH"
        instructorName:
          type: string
          example: "Zarif -E-Zaman Talukder"
        description:
          type: string
          example: "Learn how to design information systems."
        credits:
          type: integer
          example: 3
        language:
          type: string
          example: "English"
        price:
          type: number
          format: float
          example: 116.99
        attributes:
          type: object
          properties:
            difficulty:
              type: string
              example: "Intermediate"
            rating:
              type: string
              example: "5.0"
        reviews:
          type: array
          items:
            type: string
          example: ["rev_104", "rev_116"]
    Meta:
      type: object
      properties:
        totalItems:
          type: integer
          example: 100
        itemsPerPage:
          type: integer
          example: 10
        totalPages:
          type: integer
          example: 10
        currentPage:
          type: integer
          example: 1
    Review:
      type: object
      properties:
        reviewId:
          type: string
          example: "rev_116"
        clientId:
          type: string
          example: "2105116"
        courseId:
          type: string
          example: "cse_326"
        comment:
          type: string
          example: "Great course but too many presentations!"
        rating:
          type: integer
          example: 5.0
  securitySchemes:
    BearerAuth:            
      type: http
      scheme: bearer
      bearerFormat: token
  parameters:
    PageParam:
      name: page
      in: query
      description: Page number for pagination
      required: false
      schema:
        type: integer
        default: 1
    LimitParam:
      name: limit
      in: query
      description: Number of items per page
      required: false
      schema:
        type: integer
        default: 20
          
  responses:
    ReviewRequest:
      description: Single review
      content:
        application/json:
          schema:
            type: object
            properties:
              reviewId:
                type: string
                example: "rev_116"
              clientId:
                type: string
                example: "2105116"
              courseId:
                type: string
                example: "cse_326"
              comment:
                type: string
                example: "Great course but too many presentations!"
              rating:
                type: integer
                example: 5.0
    ReviewListRequest:
      description: List of reviews
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                reviewId:
                  type: string
                  example: "rev_116"
                clientId:
                  type: string
                  example: "2105116"
                courseId:
                  type: string
                  example: "cse_326"
                rating:
                  type: integer
                  example: 5.0
                comment:
                  type: string
                  example: "Great course but too many presentations!"
            example:
              - reviewId: "rev_116"
                clientId: "2105116"
                courseId: "cse_326"
                comment: "Great course but too many presentations!"
                rating: 5.0
              - reviewId: "rev_117"
                clientId: "2105117"
                courseId: "cse_326"
                comment: "Very informative, highly recommended."
                rating: 4.0
    PaginatedReviewListRequest:
      description: Paginated list of reviews
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
              meta:
                $ref: '#/components/schemas/Meta'
            # Full Example including both data and meta
            example:
              data:
                - reviewId: "rev_116"
                  clientId: "2105116"
                  courseId: "cse_326"
                  rating: 5
                  comment: "Great course but too many presentations!"
                - reviewId: "rev_117"
                  clientId: "2105117"
                  courseId: "cse_326"
                  rating: 4
                  comment: "Very informative, highly recommended."
              meta:
                totalItems: 50
                itemsPerPage: 10
                totalPages: 5
                currentPage: 1
    CourseRequest:
      description: Single course
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
                example: "Information System Design Sessional"
              courseId:
                type: string
                example: "cse_326"
              partnerId:
                type: string
                example: "ZIH"
              instructorName:
                type: string
                example: "Zarif -E-Zaman Talukder"
              description:
                type: string
                example: "Learn how to design information systems."
              credits:
                type: integer
                example: 3
              language:
                type: string
                example: "English"
              price:
                type: number
                format: float
                example: 116.99
              attributes:
                type: object
                properties:
                  difficulty:
                    type: string
                    example: "Intermediate"
                  rating:
                    type: string
                    example: "5"
              reviews:
                type: array
                items:
                  type: string
                example: 
                  - "rev_104"
                  - "rev_116"
                  - "rev_117"
    CourseListRequest:
      description: List of courses
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                title: { type: string }
                courseId: { type: string }
                partnerId: { type: string }
                description: { type: string }
                language: { type: string }
                price: { type: number, format: float }
                attributes:
                  type: object
                  properties:
                    difficulty: { type: string }
                    rating: { type: string }
                reviews:
                  type: array
                  items: { type: string }
            example:
              - title: "Information System Design Sessional"
                courseId: "cse_326"
                partnerId: "ZIH"
                description: "Learn how to design information systems."
                language: "English"
                price: 116.96
                attributes:
                  difficulty: "Intermediate"
                  rating: "5.0"
                reviews: ["rev_104", "rev_116", "rev_117"]
              
              - title: "Database Sessional"
                courseId: "cse_216"
                partnerId: "NIT"
                description: "Deep dive into SQL."
                language: "English"
                price: 117.40
                attributes:
                  difficulty: "Advanced"
                  rating: "4.8"
                reviews: ["rev_94", "rev_96", "rev_102"]
    PaginatedCourseListRequest:
      description: Paginated list of courses
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  $ref: '#/components/schemas/Course'
              meta:
                $ref: '#/components/schemas/Meta'
            # Full Example for the Swagger UI
            example:
              data:
                - title: "Information System Design Sessional"
                  courseId: "cse_326"
                  partnerId: "ZIH"
                  instructorName: "Zarif -E-Zaman Talukder"
                  description: "Learn how to design information systems."
                  credits: 3
                  language: "English"
                  price: 116.99
                  attributes:
                    difficulty: "Intermediate"
                    rating: "5.0"
                  reviews: ["rev_104", "rev_116", "rev_117"]
                - title: "Database Sessional"
                  courseId: "cse_216"
                  partnerId: "NIT"
                  instructorName: "John Doe"
                  description: "Deep dive into SQL."
                  credits: 3
                  language: "English"
                  price: 117.40
                  attributes:
                    difficulty: "Advanced"
                    rating: "4.8"
                  reviews: ["rev_94", "rev_96"]
              meta:
                totalItems: 120
                itemsPerPage: 10
                totalPages: 12
                currentPage: 1
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Invalid input provided."
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Authentication token is missing or invalid."
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "You do not have permission to access this resource."
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "The requested resource was not found."
    ServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "An unexpected error occurred on the server."